<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midas Command Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>
    
    <div class="ui-panel">
        <div class="header-box">
            <h1 class="glitch-title">MIDAS</h1>
            <h2 class="subtitle">CLONE WARS RP</h2>
            <div class="aurebesh-sub">REPUBLIC COMMAND TERMINAL INITIALIZING</div>
        </div>
        
        <div class="status-box">
            <div class="aurebesh-bg">SYSTEM BOOT SEQUENCE</div>
            <div id="status">Awaiting Server Handshake...</div>
            
            <div class="progress-container">
                <div id="progress-fill" class="progress-bar"></div>
            </div>
            
            <div class="file-counter">
                DATA NODES: <span id="files">0 / 0</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
